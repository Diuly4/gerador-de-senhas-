<!DOCTYPE html>
<html lang="pt-br">
<head>  
  <meta charset="UTF-8">
  <meta name="viewport" content="windth=device-width,initial-scale=1.0">
  <title>Gerador de senha</title>
  <link real="stylesheet"href="style.css">
</head>
<body>
  <section class="conteudo">
    <div class="conteudotitulo">
      <img src="unlock.svg" alt="cadeado fechado">
      <h2 class="titulo-principal">Gerador de senhas</h2>
      <h3 class="titulo-secundario">Gere instantemente uma senha aleatótiae segure</h3>
    </div>
    <div class="conteudo-senha">
      <label for="senha">Senha</label>
      <input name="senha"type="text"ind="campo-senha"readonly>
    </div>
    <div class="parametro">
      <h3 class="parametro-titulo">Personalize sua senha</h3>
      <div class='parametro-coluna_senha">
        <div class="parametro-senha">
        <h4 class="paranetro-senha_titulo">Número de caracteres</h4>
        <div class="parametros-senha-botoes">
        <button class="parametro-senha_botao">-</button>
        </div>
        </div>
        <div class="parametro-senha">
        <h4 class="paramero-senha_titilo">Características da senha</h4>
        <div class="parametro-senha-checkbox">
        <input name="maiuculo"type="checkbox"class="checkbox"checked>
        <label for="maiusculo">Letras maiúsculas/label>
